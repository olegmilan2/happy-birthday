name: Telegram Birthday Reminders

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Kyiv
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.HAPPY }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '88590436' }}
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL || 'https://happy-birthday-ca27d-default-rtdb.firebaseio.com' }}
      FORCE_TEST: ${{ github.event_name == 'workflow_dispatch' }}
      TARGET_TIMEZONE: Europe/Kyiv
      TARGET_HOUR: "12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send reminders
        run: node scripts/notify-from-firebase.js
