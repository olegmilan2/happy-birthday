<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e86f3f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Birthdays" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icons/app-icon.svg" />
    <link rel="apple-touch-icon" href="./icons/app-icon.svg" />
    <title>Happy Birthday Manager</title>
    <style>
      :root {
        --bg: #fff9f1;
        --card: #ffffff;
        --text: #1f1f1f;
        --muted: #6c675f;
        --accent: #e86f3f;
        --accent-2: #ffd66b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #ffe7bf 0%, transparent 35%),
          radial-gradient(circle at 90% 0%, #ffd3b8 0%, transparent 35%),
          var(--bg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--card);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.6rem, 3vw, 2.2rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 12px;
        margin-bottom: 18px;
      }

      input,
      button {
        font: inherit;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #e5ddcf;
      }

      button {
        border: none;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        color: #22150e;
        font-weight: 700;
        cursor: pointer;
      }

      .note {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .status {
        margin: 0;
        min-height: 22px;
        color: #2f6b24;
        font-weight: 600;
      }

      .status.error {
        color: #9f2a2a;
      }

      .status-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 14px;
        min-height: 24px;
      }

      .status-icon {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: linear-gradient(135deg, #2ecf8f, #1da86d);
        position: relative;
        opacity: 0;
        transform: scale(0.85);
        transition: opacity 0.22s ease, transform 0.22s ease;
      }

      .status-icon::after {
        content: "";
        position: absolute;
        left: 7px;
        top: 4px;
        width: 5px;
        height: 9px;
        border-right: 2px solid #fff;
        border-bottom: 2px solid #fff;
        transform: rotate(40deg);
      }

      .status-icon.show {
        opacity: 1;
        transform: scale(1);
        animation: pop-in 0.3s ease;
      }

      @keyframes pop-in {
        0% {
          transform: scale(0.72);
        }
        70% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }

      ul {
        margin: 14px 0 0;
        padding-left: 18px;
      }

      .birthday-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .delete-btn {
        background: #fff;
        color: #9f2a2a;
        border: 1px solid #e8c8c8;
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }

      .delete-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Happy Birthday Manager</h1>
      <p>
        Добавьте имя и дату один раз. Дальше сервис сам создаст событие в
        календаре (50 лет) и отправит напоминание в Telegram.
      </p>

      <form id="birthdayForm" novalidate>
        <input id="nameInput" type="text" placeholder="Имя" />
        <input id="dateInput" type="date" />
        <label class="note" for="unknownYear">
          <input id="unknownYear" type="checkbox" />
          Год рождения не знаю
        </label>
        <input
          id="monthDayInput"
          type="text"
          placeholder="ДД.ММ (например 02.04)"
          inputmode="numeric"
          maxlength="5"
          style="display: none"
        />
        <button id="addBtn" type="submit">Добавить</button>
      </form>

      <div class="status-wrap">
        <span id="statusIcon" class="status-icon" aria-hidden="true"></span>
        <div id="status" class="status"></div>
      </div>
      <div class="note">Список сохраненных дней рождения:</div>
      <ul id="birthdayList"></ul>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
