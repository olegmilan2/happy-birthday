<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Manager</title>
    <style>
      :root {
        --bg: #fff9f1;
        --card: #ffffff;
        --text: #1f1f1f;
        --muted: #6c675f;
        --accent: #e86f3f;
        --accent-2: #ffd66b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #ffe7bf 0%, transparent 35%),
          radial-gradient(circle at 90% 0%, #ffd3b8 0%, transparent 35%),
          var(--bg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--card);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.6rem, 3vw, 2.2rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 12px;
        margin-bottom: 18px;
      }

      input,
      button {
        font: inherit;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #e5ddcf;
      }

      button {
        border: none;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        color: #22150e;
        font-weight: 700;
        cursor: pointer;
      }

      .note {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .status {
        margin: 0 0 14px;
        min-height: 22px;
        color: #2f6b24;
        font-weight: 600;
      }

      .status.error {
        color: #9f2a2a;
      }

      ul {
        margin: 14px 0 0;
        padding-left: 18px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Happy Birthday Manager</h1>
      <p>
        Добавьте имя и дату один раз. Дальше сервис сам создаст событие в
        календаре (50 лет) и отправит напоминание в Telegram.
      </p>

      <form id="birthdayForm" novalidate>
        <input id="nameInput" type="text" placeholder="Имя" />
        <input id="dateInput" type="date" />
        <label class="note" for="unknownYear">
          <input id="unknownYear" type="checkbox" />
          Год рождения не знаю
        </label>
        <input
          id="monthDayInput"
          type="text"
          placeholder="ДД.ММ (например 02.04)"
          inputmode="numeric"
          maxlength="5"
          style="display: none"
        />
        <button id="addBtn" type="submit">Добавить</button>
      </form>

      <div id="status" class="status"></div>
      <div class="note">Список сохраненных дней рождения:</div>
      <ul id="birthdayList"></ul>
    </main>

    <script src="./config.js"></script>
    <script>
      const form = document.getElementById("birthdayForm");
      const nameInput = document.getElementById("nameInput");
      const dateInput = document.getElementById("dateInput");
      const addBtn = document.getElementById("addBtn");
      const statusNode = document.getElementById("status");
      const listNode = document.getElementById("birthdayList");
      const unknownYearCheckbox = document.getElementById("unknownYear");
      const monthDayInput = document.getElementById("monthDayInput");
      const API_BASE =
        (window.APP_CONFIG && window.APP_CONFIG.API_BASE
          ? String(window.APP_CONFIG.API_BASE)
          : ""
        ).replace(/\/+$/, "");

      function apiUrl(path) {
        return API_BASE ? `${API_BASE}${path}` : path;
      }

      function setStatus(message, isError = false) {
        statusNode.textContent = message;
        statusNode.classList.toggle("error", isError);
      }

      function renderBirthdays(items) {
        listNode.innerHTML = "";
        if (!items.length) {
          const li = document.createElement("li");
          li.textContent = "Пока пусто";
          listNode.appendChild(li);
          return;
        }
        items.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = `${item.name} — ${formatDateForUi(item.date)}`;
          listNode.appendChild(li);
        });
      }

      function renderBirthdayItem(item, append = false) {
        const li = document.createElement("li");
        li.textContent = `${item.name} — ${formatDateForUi(item.date)}`;
        if (append) {
          listNode.appendChild(li);
          return;
        }
        listNode.prepend(li);
      }

      function formatDateForUi(value) {
        const parts = String(value || "").split("-");
        if (parts.length === 2) {
          return `${parts[1]}.${parts[0]}`;
        }
        if (parts.length === 3) {
          return `${parts[2]}.${parts[1]}.${parts[0]}`;
        }
        return String(value || "");
      }

      function parseUnknownYearDate(value) {
        const match = /^(\d{2})\.(\d{2})$/.exec(value.trim());
        if (!match) {
          return null;
        }
        const day = Number(match[1]);
        const month = Number(match[2]);
        const candidate = new Date(Date.UTC(2000, month - 1, day));
        const valid =
          candidate.getUTCFullYear() === 2000 &&
          candidate.getUTCMonth() === month - 1 &&
          candidate.getUTCDate() === day;

        if (!valid) {
          return null;
        }
        return `${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      }

      async function loadBirthdays() {
        const response = await fetch(apiUrl("/api/birthdays"));
        const items = await response.json();
        renderBirthdays(items);
      }

      unknownYearCheckbox.addEventListener("change", () => {
        const unknownYear = unknownYearCheckbox.checked;
        dateInput.style.display = unknownYear ? "none" : "block";
        monthDayInput.style.display = unknownYear ? "block" : "none";
      });

      monthDayInput.addEventListener("input", () => {
        const digits = monthDayInput.value.replace(/\D/g, "").slice(0, 4);
        if (digits.length <= 2) {
          monthDayInput.value = digits;
          return;
        }
        monthDayInput.value = `${digits.slice(0, 2)}.${digits.slice(2)}`;
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("");

        const name = nameInput.value.trim();
        const unknownYear = unknownYearCheckbox.checked;
        const unknownYearDate = unknownYear
          ? parseUnknownYearDate(monthDayInput.value)
          : null;
        const date = unknownYear ? unknownYearDate : dateInput.value;
        if (!name || !date) {
          setStatus("Заполните имя и дату.", true);
          return;
        }
        if (unknownYear && !unknownYearDate) {
          setStatus("Для даты без года используйте формат ДД.ММ, например 02.04.", true);
          return;
        }

        if (window.location.protocol === "file:") {
          setStatus(
            "Откройте страницу через http://localhost:3000, а не как file://.",
            true
          );
          return;
        }
        if (
          window.location.hostname.endsWith("github.io") &&
          !API_BASE
        ) {
          setStatus(
            "Для GitHub Pages укажите backend URL в config.js (APP_CONFIG.API_BASE).",
            true
          );
          return;
        }

        addBtn.disabled = true;
        const originalText = addBtn.textContent;
        addBtn.textContent = "Сохраняю...";

        try {
          const response = await fetch(apiUrl("/api/birthdays"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              date,
            }),
          });

          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || "Ошибка при добавлении");
          }

          setStatus(
            payload.message || `Добавлено: ${payload.name} (${payload.date})`
          );
          form.reset();
          dateInput.style.display = "block";
          monthDayInput.style.display = "none";
          renderBirthdayItem(payload, true);
        } catch (error) {
          setStatus(`Ошибка сети: ${error.message}`, true);
        } finally {
          addBtn.disabled = false;
          addBtn.textContent = originalText;
        }
      });

      loadBirthdays().catch(() => {
        if (window.location.hostname.endsWith("github.io")) {
          setStatus(
            "Backend не настроен. Укажите APP_CONFIG.API_BASE в config.js.",
            true
          );
          return;
        }
        setStatus("Сервер недоступен. Запустите `npm start`.", true);
      });

      setInterval(() => {
        loadBirthdays().catch(() => {});
      }, 15000);
    </script>
  </body>
</html>
